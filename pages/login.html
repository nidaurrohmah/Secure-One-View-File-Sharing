<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SecureShare Platform</title>
  <meta name="description" content="Login ke SecureShare — Secure One-View File Sharing Platform berbasis AWS">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary); }
    .auth-bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(79,70,229,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(255,153,0,0.12) 0%, transparent 50%);
    }
    .auth-wrap { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 20px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo .logo-icon {
      width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent-orange), #E67E00);
      border-radius: 14px; display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin-bottom: 12px; box-shadow: var(--shadow-glow-orange);
    }
    .auth-logo h1 { font-size: 1.5rem; font-weight: 800; }
    .auth-logo p { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 32px; }
    .auth-card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .auth-card .subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 28px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent-orange); font-weight: 600; }
    .demo-users { margin-top: 20px; padding: 14px; background: rgba(255,153,0,0.06); border: 1px solid rgba(255,153,0,0.15); border-radius: var(--radius-sm); }
    .demo-users h4 { font-size: 0.78rem; font-weight: 600; color: var(--accent-orange); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .demo-user-btn { display: block; width: 100%; text-align: left; padding: 6px 10px; background: none; border: none; color: var(--text-secondary); font-size: 0.8rem; cursor: pointer; border-radius: 4px; transition: var(--transition); font-family: inherit; }
    .demo-user-btn:hover { background: rgba(255,153,0,0.1); color: var(--text-primary); }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); padding: 10px 14px; border-radius: var(--radius-sm); font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .password-wrap { position: relative; }
    .password-wrap .form-control { padding-right: 44px; }
    .toggle-pass { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-wrap animate-fade-in">
    <div class="auth-logo">
      <div class="logo-icon">🔐</div>
      <h1>SecureShare</h1>
      <p>Secure One-View File Sharing Platform</p>
    </div>
    <div class="auth-card">
      <h2>Selamat Datang Kembali</h2>
      <p class="subtitle">Masuk ke akunmu untuk mulai sharing file secara aman.</p>
      <div class="error-msg" id="error-msg"></div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-control" type="email" id="email" placeholder="nama@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrap">
            <input class="form-control" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-pass" onclick="togglePass()">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          🔑 Masuk ke Akun
        </button>
      </form>
      <div class="demo-users">
        <h4>AWS Auth API</h4>
        <p style="font-size:0.8rem;color:var(--text-muted);line-height:1.6;">Login diverifikasi oleh Lambda dan Users table di DynamoDB. Tidak ada akun contoh di browser.</p>
      </div>
    </div>
    <div class="auth-footer">
      Belum punya akun? <a href="register.html">Daftar sekarang</a>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/cloudwatch.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    Auth.init();
    // Redirect if already logged in
    if (Auth.getSession()) Utils.redirect('dashboard.html');

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.classList.add('btn-loading');
      btn.textContent = '';
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const result = await Auth.login(email, pass);

      btn.classList.remove('btn-loading');
      btn.textContent = '🔑 Masuk ke Akun';

      if (!result.ok) {
        const err = document.getElementById('error-msg');
        err.textContent = result.error;
        err.style.display = 'block';
      } else {
        Utils.redirect('dashboard.html');
      }
    });

    function togglePass() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
